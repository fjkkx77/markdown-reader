<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MD Reader Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-highlight/lib/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link id="hljs-style" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <link id="md-style" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-light.min.css">
    
    <style>
        /* ================= 1. Apple 风格色彩与底层锁死 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --apple-blue: #007AFF; 
            --apple-green: #34C759;
            --apple-red: #FF3B30;
            --bg-base: #F2F2F7;
            --bg-surface: #FFFFFF;
            --text-main: #000000;
            --text-secondary: #6C6C70;
            --border-color: #E5E5EA;
            --header-bg: rgba(255, 255, 255, 0.85);
            --sidebar-bg: #F8F8F8;
            --header-height: 55px;
        }
        
        [data-theme="dark"] {
            --apple-blue: #0A84FF; 
            --apple-green: #30D158;
            --apple-red: #FF453A;
            --bg-base: #000000;
            --bg-surface: #1C1C1E;
            --text-main: #FFFFFF;
            --text-secondary: #EBEBF5;
            --border-color: #38383A;
            --header-bg: rgba(28, 28, 30, 0.85);
            --sidebar-bg: #151515;
        }
        
        html, body { height: 100%; width: 100%; overflow: hidden; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* ================= 2. 动态顶栏 ================= */
        header {
            flex-shrink: 0;
            height: calc(var(--header-height) + env(safe-area-inset-top));
            padding-top: env(safe-area-inset-top);
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 100;
        }

        .header-section { display: flex; align-items: center; gap: 6px; flex: 1; }
        .header-center { flex: 2; justify-content: center; text-align: center; }
        .header-right { justify-content: flex-end; }

        .icon-btn {
            background: none; border: none; color: var(--apple-blue);
            font-size: 1.3rem; padding: 8px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:active { opacity: 0.5; }
        
        .text-btn {
            background: none; border: none; color: var(--apple-blue);
            font-size: 16px; font-weight: 500; padding: 6px 10px; border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; gap: 4px;
        }
        .text-btn:active { opacity: 0.5; }
        .text-btn.danger { color: var(--apple-red); }
        .text-btn.primary { background: var(--apple-blue); color: white; font-weight: 600; }
        
        .logo-text { font-weight: 700; font-size: 1.1rem; color: var(--apple-blue); cursor: pointer; }
        .file-title-display { font-weight: 600; font-size: 1rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        
        .hidden { display: none !important; }

        /* ================= 3. 布局与绝对滚动层 ================= */
        .app-container { flex-grow: 1; position: relative; display: flex; overflow: hidden; }

        .toc-sidebar {
            width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color);
            overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 0;
            transition: transform 0.3s ease, width 0.3s ease; flex-shrink: 0; z-index: 10;
        }
        .toc-sidebar.collapsed { width: 0; border: none; padding: 0; overflow: hidden; }
        .toc-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); padding: 0 20px 10px; }
        .toc-link { display: block; padding: 8px 20px; color: var(--text-main); text-decoration: none; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid transparent; }
        .toc-link:active { background: rgba(128,128,128,0.1); }
        .toc-h1 { font-weight: 600; }
        .toc-h2 { padding-left: 30px; }
        .toc-h3 { padding-left: 40px; font-size: 13px; color: var(--text-secondary); }

        .main-content { flex-grow: 1; position: relative; background: var(--bg-surface); overflow: hidden; }

        .view-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg-surface);
        }

        /* ================= 4. 各视图样式 ================= */
        .view-home { background: var(--bg-base); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .upload-card { background: var(--bg-surface); border-radius: 16px; padding: 40px; text-align: center; border: 1px solid var(--border-color); width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .upload-icon { font-size: 4rem; color: var(--apple-blue); margin-bottom: 20px; }
        .upload-title { font-size: 1.2rem; font-weight: 500; margin-bottom: 24px; color: var(--text-secondary); }
        .btn-upload-lg { background: var(--apple-green); color: white; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 15px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }

        .view-read { padding: 30px 20px; padding-bottom: calc(30px + env(safe-area-inset-bottom)); }
        .markdown-container { max-width: 900px; margin: 0 auto; }
        .markdown-body { background: transparent !important; color: inherit !important; font-family: inherit !important; }

        /* 代码块复制按钮样式 */
        .markdown-body pre { position: relative; }
        .copy-code-btn {
            position: absolute; top: 8px; right: 8px;
            background: rgba(128, 128, 128, 0.2); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            border: none; border-radius: 4px; padding: 4px 8px;
            font-size: 12px; color: var(--apple-blue); cursor: pointer; opacity: 0.6; transition: opacity 0.2s;
        }
        .copy-code-btn:hover { opacity: 1; }

        .view-edit { display: flex; flex-direction: column; overflow: hidden; }
        .edit-pane, .preview-pane { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .edit-pane { background: var(--bg-surface); border-bottom: 1px solid var(--border-color); }
        .preview-pane { background: var(--bg-base); }
        
        /* 记事本级清晰度的编辑框 */
        #editor-textarea { 
            width: 100%; height: 100%; resize: none; border: none; outline: none; 
            background: transparent; color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; 
            font-size: 16px; line-height: 1.6; padding: 5px;
        }

        @media (min-width: 768px) {
            .view-edit { flex-direction: row; }
            .edit-pane { border-bottom: none; border-right: 1px solid var(--border-color); }
        }
        @media (max-width: 767px) {
            .toc-sidebar { position: absolute; left: -250px; height: 100%; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
            .toc-sidebar.mobile-open { transform: translateX(250px); }
        }

        /* ================= 5. 左侧历史抽屉 ================= */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; opacity: 0; transition: opacity 0.3s; }
        .drawer { position: fixed; top: 0; left: 0; height: 100vh; width: 280px; background: var(--bg-surface); z-index: 201; transform: translateX(-100%); transition: transform 0.3s; display: flex; flex-direction: column; }
        .drawer-header { padding: 20px; border-bottom: 1px solid var(--border-color); margin-top: env(safe-area-inset-top); font-weight: 600; font-size: 1.2rem; }
        .drawer-content { overflow-y: auto; flex-grow: 1; }
        .menu-action { padding: 15px 20px; display: flex; align-items: center; gap: 12px; color: var(--apple-blue); font-weight: 500; cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .menu-action:active { background: var(--border-color); }
        .history-label { padding: 20px 20px 10px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        
        /* 带有更多选项的历史记录样式 */
        .history-item { 
            padding: 12px 16px; border-bottom: 1px solid var(--border-color); 
            display: flex; align-items: center; position: relative;
        }
        .history-info {
            flex-grow: 1; display: flex; flex-direction: column; gap: 4px;
            overflow: hidden; cursor: pointer; padding-right: 10px;
        }
        .history-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; }
        .history-date { font-size: 12px; color: var(--text-secondary); }
        
        .history-more-btn {
            background: none; border: none; color: var(--text-secondary); padding: 8px 12px;
            cursor: pointer; border-radius: 6px; font-size: 16px;
        }
        .history-more-btn:active, .history-more-btn.active { background: rgba(128,128,128,0.15); color: var(--text-main); }
        
        /* 弹出的悬浮菜单 */
        .history-menu {
            position: absolute; right: 40px; top: 25px;
            background: var(--bg-surface); border: 1px solid var(--border-color);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12); border-radius: 8px;
            display: none; flex-direction: column; z-index: 10; min-width: 140px; overflow: hidden;
        }
        .history-menu.show { display: flex; }
        .history-menu-item { padding: 12px 16px; font-size: 14px; color: var(--text-main); display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .history-menu-item:active { background: var(--bg-base); }
        .history-menu-item.danger { color: var(--apple-red); }
        
    </style>
</head>
<body data-theme="light">

    <header id="main-header">
        <div class="header-section">
            <button class="icon-btn" id="btn-hamburger"><i class="fas fa-bars"></i></button>
            <button class="text-btn hidden" id="btn-back"><i class="fas fa-chevron-left"></i> 返回</button>
            <button class="text-btn danger hidden" id="btn-edit-cancel">取消</button>
            <div class="logo-text" id="header-logo"><i class="fab fa-markdown"></i> MD Reader</div>
        </div>
        
        <div class="header-section header-center">
            <div class="file-title-display hidden" id="header-title"></div>
        </div>
        
        <div class="header-section header-right">
            <button class="icon-btn hidden" id="btn-read-copy" title="复制全文"><i class="fas fa-copy"></i></button>
            
            <button class="text-btn hidden" id="btn-edit-reset">重置</button>
            <button class="text-btn primary hidden" id="btn-edit-save">保存</button>
            <button class="icon-btn hidden" id="btn-read-edit" title="编辑文档"><i class="fas fa-edit"></i></button>
            <button class="icon-btn" id="btn-theme"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <div class="app-container">
        <div class="toc-sidebar collapsed" id="toc-sidebar">
            <div class="toc-title">目录 Contents</div>
            <div id="toc-content"></div>
        </div>

        <div class="main-content">
            <div class="view-layer view-home" id="view-home">
                <div class="upload-card">
                    <i class="fas fa-file-alt upload-icon"></i>
                    <div class="upload-title">轻量级 Markdown 阅读器</div>
                    <label class="btn-upload-lg">
                        <i class="fas fa-upload"></i> 打开 MD 文件
                        <input type="file" id="file-upload-home" hidden>
                    </label>
                </div>
            </div>

            <div class="view-layer view-read hidden" id="view-read">
                <div class="markdown-container">
                    <div class="markdown-body" id="reader-content"></div>
                </div>
            </div>

            <div class="view-layer view-edit hidden" id="view-edit">
                <div class="edit-pane">
                    <textarea id="editor-textarea" placeholder="在此输入 Markdown..."></textarea>
                </div>
                <div class="preview-pane">
                    <div class="markdown-body" id="editor-preview"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header">主菜单</div>
        <div class="drawer-content">
            <div class="menu-action" id="menu-new"><i class="fas fa-plus-circle"></i> 新建空白文档</div>
            <label class="menu-action">
                <i class="fas fa-file-upload"></i> 导入本地文件
                <input type="file" id="file-upload-drawer" hidden>
            </label>
            <div class="history-label">最近打开</div>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        const { markedHighlight } = globalThis.markedHighlight;
        const markedKatex = globalThis.markedKatex;
        marked.use(
            { gfm: true, breaks: true },
            markedHighlight({
                langPrefix: 'hljs language-',
                highlight(code, lang) {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                }
            }),
            markedKatex({ throwOnError: false, output: 'html' })
        );

        let currentFile = null;
        let originalContent = '';

        const views = {
            home: document.getElementById('view-home'),
            read: document.getElementById('view-read'),
            edit: document.getElementById('view-edit')
        };
        const tocSidebar = document.getElementById('toc-sidebar');
        
        const ui = {
            btnHamburger: document.getElementById('btn-hamburger'),
            btnBack: document.getElementById('btn-back'),
            btnEditCancel: document.getElementById('btn-edit-cancel'),
            headerLogo: document.getElementById('header-logo'),
            headerTitle: document.getElementById('header-title'),
            btnReadCopy: document.getElementById('btn-read-copy'),
            btnEditReset: document.getElementById('btn-edit-reset'),
            btnEditSave: document.getElementById('btn-edit-save'),
            btnReadEdit: document.getElementById('btn-read-edit'),
            btnTheme: document.getElementById('btn-theme')
        };

        const readerContent = document.getElementById('reader-content');
        const editorTextarea = document.getElementById('editor-textarea');
        const editorPreview = document.getElementById('editor-preview');
        const tocContent = document.getElementById('toc-content');

        function switchState(newState) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            Object.values(ui).forEach(el => el.classList.add('hidden'));

            if (newState === 'home') {
                views.home.classList.remove('hidden');
                ui.btnHamburger.classList.remove('hidden');
                ui.headerLogo.classList.remove('hidden');
                ui.btnTheme.classList.remove('hidden');
                tocSidebar.classList.add('collapsed');
                
            } else if (newState === 'read') {
                views.read.classList.remove('hidden');
                ui.btnHamburger.classList.remove('hidden');
                ui.btnBack.classList.remove('hidden');
                ui.headerTitle.classList.remove('hidden');
                ui.headerTitle.innerText = currentFile.title;
                ui.btnReadCopy.classList.remove('hidden'); 
                ui.btnReadEdit.classList.remove('hidden');
                ui.btnTheme.classList.remove('hidden');
                
                renderMarkdown(currentFile.content, readerContent);
                generateTOC();
                if (window.innerWidth >= 768) tocSidebar.classList.remove('collapsed');
                
            } else if (newState === 'edit') {
                views.edit.classList.remove('hidden');
                ui.btnEditCancel.classList.remove('hidden');
                ui.btnEditReset.classList.remove('hidden');
                ui.headerTitle.classList.remove('hidden');
                ui.headerTitle.innerText = "编辑: " + currentFile.title;
                ui.btnEditSave.classList.remove('hidden');
                
                tocSidebar.classList.add('collapsed');
                originalContent = currentFile.content;
                editorTextarea.value = currentFile.content;
                renderMarkdown(currentFile.content, editorPreview);
            }
        }

        ui.btnReadCopy.onclick = () => {
            navigator.clipboard.writeText(currentFile.content).then(() => {
                ui.btnReadCopy.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => ui.btnReadCopy.innerHTML = '<i class="fas fa-copy"></i>', 2000);
            });
        };

        function goHome() {
            currentFile = null;
            document.getElementById('file-upload-home').value = '';
            document.getElementById('file-upload-drawer').value = '';
            switchState('home');
        }
        
        ui.btnBack.onclick = goHome;
        ui.headerLogo.onclick = goHome;

        function renderMarkdown(text, target) {
            target.innerHTML = marked.parse(text);
            target.querySelectorAll('h1, h2, h3, h4').forEach((heading, i) => heading.id = `heading-${i}`);
            
            target.querySelectorAll('pre code').forEach((block) => {
                if (block.parentNode.querySelector('.copy-code-btn')) return; 
                const pre = block.parentNode;
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-code-btn';
                copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(block.textContent).then(() => {
                        copyBtn.innerHTML = '<i class="fas fa-check"></i>';
                        setTimeout(() => copyBtn.innerHTML = '<i class="fas fa-copy"></i>', 2000);
                    });
                };
                pre.appendChild(copyBtn);
            });
        }

        function generateTOC() {
            tocContent.innerHTML = '';
            const headings = readerContent.querySelectorAll('h1, h2, h3, h4');
            if(headings.length === 0) return tocContent.innerHTML = '<div style="padding:20px;color:#888;">暂无目录</div>';
            
            headings.forEach(h => {
                const link = document.createElement('a');
                link.href = `#${h.id}`;
                link.className = `toc-link toc-${h.tagName.toLowerCase()}`;
                link.innerText = h.innerText;
                link.onclick = (e) => {
                    e.preventDefault();
                    const scrollContainer = document.getElementById('view-read');
                    const targetOffset = h.offsetTop;
                    scrollContainer.scrollTo({ top: targetOffset - 30, behavior: 'smooth' });
                    
                    if (window.innerWidth < 768) tocSidebar.classList.remove('mobile-open');
                };
                tocContent.appendChild(link);
            });
        }

        editorTextarea.addEventListener('input', e => renderMarkdown(e.target.value, editorPreview));

        function getHistory() { return JSON.parse(localStorage.getItem('md-pro-db')) || []; }
        function saveToHistory(file) {
            let history = getHistory();
            file.timestamp = Date.now();
            const idx = history.findIndex(f => f.id === file.id);
            if (idx > -1) history[idx] = file; else history.unshift(file);
            localStorage.setItem('md-pro-db', JSON.stringify(history.slice(0, 30)));
            renderHistoryDrawer();
        }

        function renderHistoryDrawer() {
            let history = getHistory();
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            if (history.length === 0) {
                list.innerHTML = '<div style="padding:20px;color:var(--text-secondary);font-size:13px;">暂无历史记录</div>';
                return;
            }

            history.sort((a, b) => {
                if (a.isPinned && !b.isPinned) return -1;
                if (!a.isPinned && b.isPinned) return 1;
                return b.timestamp - a.timestamp;
            });

            history.forEach(file => {
                const item = document.createElement('div');
                item.className = 'history-item';
                
                const pinIcon = file.isPinned ? `<i class="fas fa-thumbtack" style="color:var(--apple-blue); margin-right:6px; font-size:12px;"></i>` : '';
                
                item.innerHTML = `
                    <div class="history-info">
                        <span class="history-title">${pinIcon}${file.title}</span>
                        <span class="history-date">${new Date(file.timestamp).toLocaleString()}</span>
                    </div>
                    <button class="history-more-btn"><i class="fas fa-ellipsis-h"></i></button>
                    <div class="history-menu">
                        <div class="history-menu-item action-pin">
                            <i class="fas ${file.isPinned ? 'fa-unlink' : 'fa-thumbtack'}"></i>
                            ${file.isPinned ? '取消置顶' : '置顶文档'}
                        </div>
                        <div class="history-menu-item danger action-delete">
                            <i class="fas fa-trash-alt"></i> 删除记录
                        </div>
                    </div>
                `;

                const infoArea = item.querySelector('.history-info');
                const moreBtn = item.querySelector('.history-more-btn');
                const menu = item.querySelector('.history-menu');
                const btnPin = item.querySelector('.action-pin');
                const btnDelete = item.querySelector('.action-delete');

                infoArea.onclick = () => {
                    currentFile = file;
                    closeDrawer();
                    switchState('read');
                };

                moreBtn.onclick = (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.history-menu.show').forEach(m => {
                        if (m !== menu) m.classList.remove('show');
                    });
                    
                    if (!menu.classList.contains('show')) {
                        menu.classList.add('show');
                        item.style.zIndex = '100';
                        moreBtn.classList.add('active');
                    } else {
                        menu.classList.remove('show');
                        item.style.zIndex = '';
                        moreBtn.classList.remove('active');
                    }
                };

                btnPin.onclick = (e) => {
                    e.stopPropagation();
                    file.isPinned = !file.isPinned;
                    localStorage.setItem('md-pro-db', JSON.stringify(history));
                    renderHistoryDrawer(); 
                };

                btnDelete.onclick = (e) => {
                    e.stopPropagation();
                    if(confirm(`确定要删除 "${file.title}" 的记录吗？`)) {
                        history = history.filter(f => f.id !== file.id);
                        localStorage.setItem('md-pro-db', JSON.stringify(history));
                        
                        if(currentFile && currentFile.id === file.id) {
                            goHome();
                            if(window.innerWidth < 768) closeDrawer();
                        } else {
                            renderHistoryDrawer();
                        }
                    }
                };

                list.appendChild(item);
            });
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.history-more-btn')) {
                document.querySelectorAll('.history-menu.show').forEach(m => m.classList.remove('show'));
                document.querySelectorAll('.history-item').forEach(i => i.style.zIndex = '');
                document.querySelectorAll('.history-more-btn').forEach(b => b.classList.remove('active'));
            }
        });

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const title = file.name.replace(/\.[^/.]+$/, "");
            const reader = new FileReader();
            reader.onload = e => {
                currentFile = { id: Date.now().toString(), title, content: e.target.result, isPinned: false };
                saveToHistory(currentFile);
                closeDrawer();
                switchState('read');
            };
            reader.readAsText(file);
        }
        document.getElementById('file-upload-home').onchange = handleFile;
        document.getElementById('file-upload-drawer').onchange = handleFile;

        const overlay = document.getElementById('overlay');
        const drawer = document.getElementById('drawer');
        function openDrawer() { overlay.style.display = 'block'; setTimeout(() => overlay.style.opacity = '1', 10); drawer.style.transform = 'translateX(0)'; }
        function closeDrawer() { overlay.style.opacity = '0'; drawer.style.transform = 'translateX(-100%)'; setTimeout(() => overlay.style.display = 'none', 300); }
        
        ui.btnHamburger.onclick = openDrawer;
        overlay.onclick = closeDrawer;

        ui.btnReadEdit.onclick = () => switchState('edit');
        ui.btnEditCancel.onclick = () => { if(editorTextarea.value === originalContent || confirm("放弃修改？")) switchState('read'); };
        ui.btnEditReset.onclick = () => { if(confirm("重置编辑内容？")) { editorTextarea.value = originalContent; renderMarkdown(originalContent, editorPreview); } };
        ui.btnEditSave.onclick = () => { currentFile.content = editorTextarea.value; saveToHistory(currentFile); switchState('read'); };

        document.getElementById('menu-new').onclick = () => {
            const title = prompt("新文档名称：", "未命名文档");
            if (title) {
                currentFile = { id: Date.now().toString(), title, content: `# ${title}\n\n开始编写...`, isPinned: false };
                saveToHistory(currentFile);
                closeDrawer();
                switchState('edit');
            }
        };

        function setTheme(isDark) {
            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            document.getElementById('md-style').href = `https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-${isDark ? 'dark' : 'light'}.min.css`;
            document.getElementById('hljs-style').href = `https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/${isDark ? 'github-dark' : 'github'}.min.css`;
            
            ui.btnTheme.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('md-theme', isDark ? 'dark' : 'light');
        }
        
        const savedTheme = localStorage.getItem('md-theme');
        setTheme(savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches));
        ui.btnTheme.onclick = () => setTheme(document.body.getAttribute('data-theme') === 'light');

        renderHistoryDrawer();
        switchState('home');
    </script>
</body>
</html>
